<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letter Card</title>

<style>
body{
  margin:0;
  font-family:tahoma;
  background:linear-gradient(135deg,#7b2ff7,#f107a3,#17eaff);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* پاکت اولیه */
.envelope{
  width:220px;
  height:140px;
  background:#ff4fa3;
  position:relative;
  border-radius:10px;
  cursor:pointer;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
  transition:0.3s;
}

.envelope:before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:0;
  height:0;
  border-left:110px solid transparent;
  border-right:110px solid transparent;
  border-bottom:80px solid #ff2f8f;
}

.envelope:hover{
  transform:scale(1.05);
}

/* کارت نامه */
.card{
  display:none;
  background:#fff;
  width:90%;
  max-width:500px;
  border-radius:20px;
  padding:25px;
  box-shadow:0 0 30px rgba(0,0,0,0.3);
  animation:open 0.6s ease;
}

@keyframes open{
  from{transform:scale(0.5);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

h2{
  color:#d1007a;
}

p{
  color:#333;
  line-height:2;
}

.signature{
  margin-top:20px;
  color:#555;
  font-weight:bold;
}

/* دکمه لینک */
a{
  display:inline-block;
  margin-top:15px;
  padding:10px 20px;
  background:linear-gradient(45deg,#00d4ff,#00ff99);
  color:black;
  border-radius:20px;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- پاکت -->
<div class="envelope" onclick="openLetter()"></div>

<!-- نامه -->
<div class="card" id="card">
  <h2 id="title">💌 معلم گرامی</h2>

  <p id="text">
  این یک نامه نمونه است.  
  متن بعداً از Firebase یا فرم پر می‌شود.
  </p>

  <div class="signature">با احترام 💖</div>

  <a href="https://eitaa.com/irandigital_python" target="_blank">
    📢 کانال ایران دیجیتال | Python
  </a>
</div>

<script>
function openLetter(){
  document.querySelector(".envelope").style.display="none";
  document.getElementById("card").style.display="block";
}
</script>

</body>
</html>
