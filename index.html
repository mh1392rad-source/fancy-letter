<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Letter</title>

<style>
body{
  margin:0;
  font-family:tahoma;
  background:radial-gradient(circle at top,#7b2ff7,#f107a3,#0ff);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* فرم */
.box{
  background:rgba(0,0,0,0.75);
  padding:20px;
  border-radius:25px;
  width:90%;
  max-width:420px;
  color:white;
  box-shadow:0 0 25px rgba(0,255,255,0.3);
}

input,textarea{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:20px;
  background:linear-gradient(45deg,#00ffcc,#00d4ff);
  font-weight:bold;
  cursor:pointer;
}

/* پاکت لاکچری */
.envelope{
  width:240px;
  height:160px;
  background:linear-gradient(135deg,#ff4fa3,#ff2f8f);
  border-radius:12px;
  position:relative;
  box-shadow:0 0 40px rgba(255,0,150,0.4);
  cursor:pointer;
  animation:float 2s infinite ease-in-out;
}

.envelope:before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  border-left:120px solid transparent;
  border-right:120px solid transparent;
  border-bottom:90px solid rgba(255,255,255,0.15);
}

/* شناور شدن */
@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

/* نامه */
.card{
  display:none;
  background:rgba(255,255,255,0.95);
  width:90%;
  max-width:600px;
  padding:30px;
  border-radius:25px;
  text-align:center;
  box-shadow:0 0 40px rgba(0,0,0,0.3);
  animation:open 0.7s ease;
}

@keyframes open{
  from{transform:scale(0.6);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

h2{
  color:#d1007a;
  margin-bottom:10px;
}

p{
  color:#333;
  line-height:2;
}

/* دکمه لینک */
a{
  display:inline-block;
  margin-top:15px;
  padding:10px 20px;
  background:linear-gradient(45deg,#00d4ff,#00ff99);
  color:black;
  border-radius:20px;
  text-decoration:none;
  font-weight:bold;
}

/* افکت ذرات */
.particle{
  position:absolute;
  width:6px;
  height:6px;
  background:white;
  border-radius:50%;
  animation:rise 3s linear infinite;
  opacity:0.7;
}

@keyframes rise{
  from{transform:translateY(0);opacity:1;}
  to{transform:translateY(-300px);opacity:0;}
}
</style>
</head>

<body>

<div class="box" id="form">
<h2>💌 ساخت نامه لاکچری</h2>

<input id="student" placeholder="نام دانش‌آموز">
<input id="teacher" placeholder="نام معلم">
<textarea id="msg" placeholder="متن نامه"></textarea>

<button onclick="start()">ساخت نامه</button>
</div>

<div id="env" style="display:none">
<div class="envelope" onclick="openLetter()"></div>
</div>

<div class="card" id="card">
<h2 id="title"></h2>
<p id="text"></p>

<a href="https://eitaa.com/irandigital_python" target="_blank">
📢 کانال ایران دیجیتال | Python
</a>
</div>

<script>
function start(){
  document.getElementById("form").style.display="none";
  document.getElementById("env").style.display="block";

  createParticles();
}

function openLetter(){
  document.getElementById("env").style.display="none";
  document.getElementById("card").style.display="block";

  document.getElementById("title").innerText =
  "معلم گرامی " + document.getElementById("teacher").value;

  document.getElementById("text").innerHTML =
  document.getElementById("msg").value.replace(/\n/g,"<br>");
}

/* ذرات لاکچری */
function createParticles(){
  for(let i=0;i<25;i++){
    let p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"%";
    p.style.top=Math.random()*100+"%";
    p.style.animationDuration=(2+Math.random()*3)+"s";
    document.body.appendChild(p);
  }
}
</script>

</body>
</html>
