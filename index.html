<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fancy Letter PRO</title>

<style>
body{
  margin:0;
  font-family:tahoma;
  background:linear-gradient(135deg,#6a11cb,#2575fc,#00e5ff);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box{
  background:rgba(0,0,0,0.75);
  padding:20px;
  border-radius:25px;
  width:90%;
  max-width:420px;
  color:white;
  text-align:center;
}

input,textarea{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  margin-top:6px;
  border:none;
  border-radius:20px;
  background:linear-gradient(45deg,#00ffcc,#00d4ff);
  font-weight:bold;
  cursor:pointer;
}

.card{
  display:none;
  background:white;
  width:90%;
  max-width:500px;
  padding:25px;
  border-radius:20px;
  text-align:center;
}

img{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #ff4fa3;
}

audio{
  width:100%;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- FORM -->
<div class="box" id="form">
<h2>💌 ساخت نامه حرفه‌ای</h2>

<input id="student" placeholder="نام دانش‌آموز">
<input id="teacher" placeholder="نام معلم">
<textarea id="msg" placeholder="متن نامه"></textarea>
<input type="file" id="file">
<input id="musicUrl" placeholder="لینک آهنگ">

<button onclick="saveLetter()">ساخت نامه</button>
</div>

<!-- CARD -->
<div class="card" id="card">
<img id="photo">
<h2 id="title"></h2>
<p id="text"></p>

<audio id="music" controls loop></audio>

<p id="link"></p>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
"https://ycbnblhxzzcslturozrf.supabase.co",
"sb_publishable_7aHzH58mQSbSKkdhu0emqQ_YaTegw3q"
);

/* ===== IMAGE ===== */
function toBase64(file){
  return new Promise(res=>{
    let r=new FileReader();
    r.onload=()=>res(r.result);
    r.readAsDataURL(file);
  });
}

/* ===== SAVE TO SUPABASE ===== */
window.saveLetter = async function(){

  let id = Math.random().toString(36).substring(2,10);

  let file = document.getElementById("file").files[0];
  let img = file ? await toBase64(file) : "";

  let music = document.getElementById("musicUrl").value;

  const data = {
    id,
    student: student.value,
    teacher: teacher.value,
    msg: msg.value,
    img,
    music
  };

  const { error } = await supabase
    .from("letters")
    .insert([data]);

  if(error){
    alert("خطا در ذخیره ❌");
    console.log(error);
    return;
  }

  show(data, id);
};

/* ===== SHOW LETTER ===== */
function show(d,id){

  form.style.display="none";
  card.style.display="block";

  title.innerText="معلم گرامی " + d.teacher;
  text.innerText=d.msg;

  photo.src=d.img || "";

  music.src = d.music || "";

  let url = window.location.origin + window.location.pathname + "?id=" + id;

  link.innerHTML = `
    🔗 لینک نامه:
    <br>
    <button onclick="copy('${url}')">📋 کپی لینک</button>
  `;
}

/* ===== COPY ===== */
window.copy = function(url){
  navigator.clipboard.writeText(url);
  alert("لینک کپی شد 📋");
};

/* ===== LOAD FROM LINK ===== */
window.onload = async function(){

  const id = new URLSearchParams(location.search).get("id");

  if(id){
    const { data } = await supabase
      .from("letters")
      .select("*")
      .eq("id", id)
      .single();

    if(data) show(data, id);
  }
};
</script>

</body>
</html>
