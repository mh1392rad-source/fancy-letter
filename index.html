<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firebase Letter Final</title>

<style>
body{
  margin:0;
  font-family:tahoma;
  background:linear-gradient(135deg,#7b2ff7,#f107a3,#00e5ff);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box{
  background:rgba(0,0,0,0.75);
  padding:20px;
  border-radius:25px;
  width:90%;
  max-width:420px;
  color:white;
}

input,textarea{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:20px;
  background:linear-gradient(45deg,#00ffcc,#00d4ff);
  font-weight:bold;
  cursor:pointer;
}

.envelope{
  width:240px;
  height:160px;
  background:linear-gradient(135deg,#ff4fa3,#ff0077);
  border-radius:12px;
  cursor:pointer;
  box-shadow:0 0 40px rgba(255,0,150,0.4);
  margin:auto;
}

.card{
  display:none;
  background:white;
  width:90%;
  max-width:600px;
  padding:30px;
  border-radius:25px;
  text-align:center;
  box-shadow:0 0 40px rgba(0,0,0,0.4);
}

h2{color:#d1007a;}
p{color:#333;line-height:2;}

a{
  display:inline-block;
  margin-top:15px;
  padding:10px 20px;
  background:linear-gradient(45deg,#00d4ff,#00ff99);
  color:black;
  border-radius:20px;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="box" id="form">
<h2>💌 ساخت نامه Firebase</h2>

<input id="student" placeholder="نام دانش‌آموز">
<input id="teacher" placeholder="نام معلم">
<textarea id="msg" placeholder="متن نامه"></textarea>

<button onclick="saveLetter()">ساخت و ارسال</button>
</div>

<div class="card" id="card">
<h2 id="title"></h2>
<p id="text"></p>
<p id="link"></p>

<a href="https://eitaa.com/irandigital_python" target="_blank">
📢 کانال ایران دیجیتال | Python
</a>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBqyOm4xSfeUrThKDcA0mRM5OSZFOMyWcE",
  authDomain: "fancy-letter.firebaseapp.com",
  projectId: "fancy-letter",
  storageBucket: "fancy-letter.firebasestorage.app",
  messagingSenderId: "677609888778",
  appId: "1:677609888778:web:df826638952bd2c59593f3"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.saveLetter = function(){

  let id = Math.random().toString(36).substring(2,10);

  let data = {
    student: document.getElementById("student").value,
    teacher: document.getElementById("teacher").value,
    msg: document.getElementById("msg").value
  };

  set(ref(db,"letters/"+id), data);

  document.getElementById("form").style.display="none";
  document.getElementById("card").style.display="block";

  document.getElementById("title").innerText =
  "معلم گرامی " + data.teacher;

  document.getElementById("text").innerHTML =
  data.msg.replace(/\n/g,"<br>");

  let link = window.location.href.split('?')[0] + "?id=" + id;

  document.getElementById("link").innerHTML =
  "🔗 لینک دائمی نامه:<br>" + link;
};

// خواندن نامه با لینک
const url = new URLSearchParams(window.location.search);
const id = url.get("id");

if(id){
  get(child(ref(db),"letters/"+id)).then((snap)=>{
    if(snap.exists()){
      let d = snap.val();

      document.getElementById("form").style.display="none";
      document.getElementById("card").style.display="block";

      document.getElementById("title").innerText =
      "معلم گرامی " + d.teacher;

      document.getElementById("text").innerHTML =
      d.msg.replace(/\n/g,"<br>");
    }
  });
}
</script>

</body>
</html>﻿
