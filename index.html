<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fancy Letter FINAL</title>

<style>
body{
  margin:0;
  font-family:tahoma;
  background:linear-gradient(135deg,#7b2ff7,#f107a3,#00e5ff);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box{
  background:rgba(0,0,0,0.75);
  padding:20px;
  border-radius:25px;
  width:90%;
  max-width:420px;
  color:white;
  text-align:center;
}

input,textarea{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  margin-top:6px;
  border:none;
  border-radius:20px;
  background:linear-gradient(45deg,#00ffcc,#00d4ff);
  font-weight:bold;
  cursor:pointer;
}

.card{
  display:none;
  background:white;
  width:90%;
  max-width:500px;
  padding:25px;
  border-radius:20px;
  text-align:center;
}

img{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #ff4fa3;
}

audio{
  width:100%;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="box" id="loginBox">
<h2>🔐 ورود ایمیلی</h2>
<input id="email" placeholder="ایمیل">
<button onclick="login()">ارسال لینک ورود</button>
</div>

<!-- FORM -->
<div class="box" id="form" style="display:none;">
<h2>💌 ساخت نامه</h2>

<input id="student" placeholder="نام دانش‌آموز">
<input id="teacher" placeholder="نام معلم">
<textarea id="msg" placeholder="متن نامه"></textarea>
<input type="file" id="file">
<input id="musicUrl" placeholder="لینک آهنگ (mp3)">

<button onclick="saveLetter()">ساخت نامه</button>
<button onclick="logout()">خروج</button>
</div>

<!-- CARD -->
<div class="card" id="card">
<img id="photo">
<h2 id="title"></h2>
<p id="text"></p>

<audio id="music" controls loop></audio>

<p id="link"></p>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

/* 🔥 CONFIG */
const supabase = createClient(
"https://ycbnblhxzzcslturozrf.supabase.co",
"sb_publishable_7aHzH58mQSbSKkdhu0emqQ_YaTegw3q"
);

/* ===== LOGIN ===== */
window.login = async function(){
  let email = document.getElementById("email").value;

  let { error } = await supabase.auth.signInWithOtp({
    email
  });

  if(error){
    alert("خطا در ارسال ایمیل ❌");
  }else{
    alert("لینک ورود ارسال شد 📧");
  }
};

/* ===== UI ===== */
function updateUI(session){
  if(session){
    loginBox.style.display="none";
    form.style.display="block";
  }else{
    loginBox.style.display="block";
    form.style.display="none";
  }
}

/* ===== INIT SESSION ===== */
window.addEventListener("load", async () => {

  // 🔥 مهم: خواندن session بعد از کلیک لینک
  const { data } = await supabase.auth.getSession();

  updateUI(data.session);
});

/* ===== LISTENER (REAL TIME LOGIN FIX) ===== */
supabase.auth.onAuthStateChange((event, session) => {
  updateUI(session);
});

/* ===== LOGOUT ===== */
window.logout = async function(){
  await supabase.auth.signOut();
  location.reload();
};

/* ===== BASE64 IMAGE ===== */
function toBase64(file){
  return new Promise(res=>{
    let r=new FileReader();
    r.onload=()=>res(r.result);
    r.readAsDataURL(file);
  });
}

/* ===== SAVE LETTER ===== */
window.saveLetter = async function(){

  let id = Math.random().toString(36).substring(2,10);

  let file = document.getElementById("file").files[0];
  let img = file ? await toBase64(file) : "";

  let music = document.getElementById("musicUrl").value;

  let { data: user } = await supabase.auth.getUser();

  let data = {
    id,
    user_id: user.user.id,
    student: student.value,
    teacher: teacher.value,
    msg: msg.value,
    img,
    music
  };

  await supabase.from("letters").insert([data]);

  show(data,id);
};

/* ===== SHOW LETTER ===== */
function show(d,id){

  form.style.display="none";
  card.style.display="block";

  title.innerText="معلم گرامی " + d.teacher;
  text.innerText=d.msg;

  photo.src=d.img || "";

  let m = document.getElementById("music");
  if(d.music){
    m.src = d.music;
    m.style.display="block";
  }else{
    m.style.display="none";
  }

  let url = window.location.href.split('?')[0] + "?id=" + id;

  link.innerHTML = `
    🔗 لینک نامه:
    <br>
    <button onclick="share('${url}')">📤 ارسال</button>
    <button onclick="copyLink('${url}')">📋 کپی</button>
  `;
}

/* ===== SHARE ===== */
window.share = async function(url){
  if(navigator.share){
    navigator.share({ title:"Fancy Letter", url });
  }else{
    copyLink(url);
  }
};

/* ===== COPY ===== */
window.copyLink = function(url){
  navigator.clipboard.writeText(url);
  alert("لینک کپی شد 📋");
};

/* ===== LOAD LETTER BY LINK ===== */
window.onload = async function(){

  let id = new URLSearchParams(location.search).get("id");

  if(id){
    let { data } = await supabase
      .from("letters")
      .select("*")
      .eq("id", id)
      .single();

    if(data) show(data,id);
  }
};
</script>

</body>
</html>
