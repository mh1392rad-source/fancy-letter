<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letter Creator Pro</title>

<style>
body{
  margin:0;
  font-family:tahoma;
  background:linear-gradient(120deg,#7b2ff7,#f107a3,#17eaff);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  background:rgba(0,0,0,0.7);
  padding:20px;
  border-radius:25px;
  width:90%;
  max-width:420px;
  color:white;
  backdrop-filter:blur(10px);
}

input,textarea{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:20px;
  background:#00ffcc;
  font-weight:bold;
  cursor:pointer;
}

#letter{
  display:none;
  position:fixed;
  inset:0;
  overflow:auto;
  padding-top:120px;
}

.profile{
  width:120px;
  height:120px;
  border-radius:50%;
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  object-fit:cover;
  border:4px solid white;
}

.card{
  background:rgba(0,0,0,0.75);
  color:white;
  padding:25px;
  border-radius:25px;
  max-width:600px;
  margin:auto;
  text-align:center;
  box-shadow:0 0 20px cyan;
}

a{
  display:inline-block;
  margin-top:15px;
  padding:10px 20px;
  background:linear-gradient(45deg,#00d4ff,#00ff99);
  color:black;
  border-radius:20px;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container" id="form">
<h2>📨 Letter Creator Pro</h2>

<input id="student" placeholder="نام دانش‌آموز">
<input id="teacher" placeholder="نام معلم">
<input id="school" placeholder="مدرسه">
<textarea id="msg" placeholder="متن نامه"></textarea>

<label>📷 عکس</label>
<input type="file" id="img" accept="image/*">

<label>🎵 آهنگ</label>
<input type="file" id="music" accept="audio/*">

<button onclick="create()">ساخت نامه</button>
</div>

<div id="letter">

<img class="profile" id="photo">

<audio id="audio" controls style="position:fixed;bottom:10px;left:10px;width:200px;"></audio>

<div class="card">
<h2 id="title"></h2>
<p id="text"></p>

<a href="https://eitaa.com/irandigital_python" target="_blank">
📢 کانال ایران دیجیتال | Python
</a>
</div>

</div>

<script>
function create(){

  let student = document.getElementById("student").value;
  let teacher = document.getElementById("teacher").value;
  let msg = document.getElementById("msg").value;

  document.getElementById("title").innerText =
  "معلم گرامی " + teacher;

  document.getElementById("text").innerHTML =
  msg.replace(/\n/g,"<br>");

  let img = document.getElementById("img").files[0];
  if(img){
    document.getElementById("photo").src = URL.createObjectURL(img);
  }

  let music = document.getElementById("music").files[0];
  if(music){
    let audio = document.getElementById("audio");
    audio.src = URL.createObjectURL(music);
    audio.play();
  }

  document.getElementById("form").style.display="none";
  document.getElementById("letter").style.display="block";
}
</script>

</body>
</html>
