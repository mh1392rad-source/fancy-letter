<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fancy Letter Pro</title>

<style>
body{
  margin:0;
  font-family:tahoma;
  background:linear-gradient(135deg,#7b2ff7,#f107a3,#17eaff);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* فرم */
.box{
  background:rgba(0,0,0,0.75);
  padding:20px;
  border-radius:25px;
  width:90%;
  max-width:420px;
  color:white;
}

input,textarea{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:20px;
  background:#00ffcc;
  font-weight:bold;
  cursor:pointer;
}

/* پاکت */
.envelope{
  width:220px;
  height:140px;
  background:#ff4fa3;
  position:relative;
  border-radius:10px;
  cursor:pointer;
  box-shadow:0 0 25px rgba(0,0,0,0.3);
  transition:0.3s;
  margin:auto;
}

.envelope:before{
  content:"";
  position:absolute;
  border-left:110px solid transparent;
  border-right:110px solid transparent;
  border-bottom:80px solid #ff2f8f;
  top:0;
}

.envelope:hover{
  transform:scale(1.05);
}

/* نامه */
.card{
  display:none;
  background:white;
  width:90%;
  max-width:600px;
  padding:25px;
  border-radius:20px;
  box-shadow:0 0 30px rgba(0,0,0,0.3);
  animation:open 0.6s ease;
  text-align:center;
}

@keyframes open{
  from{transform:scale(0.5);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

h2{color:#d1007a;}
p{line-height:2;color:#333;}
.signature{margin-top:15px;color:#555;font-weight:bold;}

a{
  display:inline-block;
  margin-top:15px;
  padding:10px 20px;
  background:linear-gradient(45deg,#00d4ff,#00ff99);
  color:black;
  border-radius:20px;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- فرم -->
<div class="box" id="form">
<h2>📨 ساخت نامه</h2>

<input id="student" placeholder="نام دانش‌آموز">
<input id="teacher" placeholder="نام معلم">
<textarea id="msg" placeholder="متن نامه"></textarea>

<button onclick="saveLetter()">ساخت نامه</button>
</div>

<!-- پاکت -->
<div id="env" style="display:none">
<div class="envelope" onclick="openLetter()"></div>
</div>

<!-- کارت نامه -->
<div class="card" id="card">
<h2 id="title"></h2>
<p id="text"></p>
<div class="signature">با احترام 💖</div>

<a href="https://eitaa.com/irandigital_python" target="_blank">
📢 کانال ایران دیجیتال | Python
</a>

<p id="link"></p>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBqyOm4xSfeUrThKDcA0mRM5OSZFOMyWcE",
  authDomain: "fancy-letter.firebaseapp.com",
  projectId: "fancy-letter",
  storageBucket: "fancy-letter.firebasestorage.app",
  messagingSenderId: "677609888778",
  appId: "1:677609888778:web:df826638952bd2c59593f3"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.saveLetter = function(){

  let id = Math.random().toString(36).substring(2,10);

  set(ref(db,"letters/"+id),{
    student:document.getElementById("student").value,
    teacher:document.getElementById("teacher").value,
    msg:document.getElementById("msg").value
  });

  document.getElementById("form").style.display="none";
  document.getElementById("env").style.display="block";

  window.currentID = id;
};

window.openLetter = function(){

  const id = window.currentID;

  get(child(ref(db),"letters/"+id)).then((snap)=>{

    if(snap.exists()){
      let d = snap.val();

      document.getElementById("env").style.display="none";
      document.getElementById("card").style.display="block";

      document.getElementById("title").innerText =
      "معلم گرامی " + d.teacher;

      document.getElementById("text").innerHTML =
      d.msg.replace(/\n/g,"<br>");

      document.getElementById("link").innerText =
      "🔗 لینک: " + window.location.href + "?id=" + id;
    }
  });
};

// خواندن با لینک
const url = new URLSearchParams(window.location.search);
const id = url.get("id");

if(id){
  get(child(ref(db),"letters/"+id)).then((snap)=>{
    if(snap.exists()){
      let d = snap.val();

      document.getElementById("form").style.display="none";
      document.getElementById("env").style.display="none";
      document.getElementById("card").style.display="block";

      document.getElementById("title").innerText =
      "معلم گرامی " + d.teacher;

      document.getElementById("text").innerHTML =
      d.msg.replace(/\n/g,"<br>");
    }
  });
}
</script>

</body>
</html>
