<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fancy Letter 🌍 AI EDITION</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:tahoma;
  background:linear-gradient(135deg,#141e30,#243b55);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box{
  background:rgba(0,0,0,0.8);
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:420px;
  color:white;
  text-align:center;
}

input,textarea,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  margin-top:6px;
  border:none;
  border-radius:15px;
  background:linear-gradient(45deg,#00ffcc,#00d4ff);
  font-weight:bold;
  cursor:pointer;
}

.card{
  display:none;
  background:white;
  width:90%;
  max-width:500px;
  padding:25px;
  border-radius:20px;
  text-align:center;
}

img{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #ff4fa3;
}

audio{
  width:100%;
  margin-top:10px;
}

#qr{
  margin-top:15px;
}
</style>
</head>

<body>

<!-- FORM -->
<div class="box" id="form">
<h2>💌 Fancy Letter AI</h2>

<input id="student" placeholder="نام دانش‌آموز">
<input id="teacher" placeholder="نام معلم">
<input id="subject" placeholder="درس معلم (مثلاً ریاضی)">

<textarea id="msg" placeholder="اگر دستی می‌نویسی اینجا بنویس"></textarea>

<select id="mode">
  <option value="manual">✍️ نوشتن دستی</option>
  <option value="ai">🤖 ساخت با هوش مصنوعی</option>
</select>

<input type="file" id="file">
<input id="musicUrl" placeholder="لینک آهنگ">

<button onclick="saveLetter()">ساخت نامه 🚀</button>
</div>

<!-- CARD -->
<div class="card" id="card">
<img id="photo">
<h2 id="title"></h2>
<p id="text"></p>

<audio id="music" controls loop></audio>

<div id="qr"></div>

<div style="margin-top:15px;">
  <a href="https://eitaa.com/irandigital_python" target="_blank"
     style="
        display:block;
        padding:12px;
        background:linear-gradient(45deg,#ff4fa3,#ffb347);
        color:white;
        border-radius:12px;
        text-decoration:none;
        font-weight:bold;
     ">
    📢 ورود به کانال ایتا
  </a>
</div>

<p id="link"></p>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
"https://ycbnblhxzzcslturozrf.supabase.co",
"sb_publishable_7aHzH58mQSbSKkdhu0emqQ_YaTegw3q"
);

/* ===== AI TEXT (demo version) ===== */
async function generateAI(student, teacher, subject){
  // 🔥 نسخه ساده (بدون API Key)
  return `دانش‌آموز عزیز ${student}

با احترام به معلم گرامی ${teacher}

از تلاش‌های شما در درس ${subject} سپاسگزاریم.
امیدواریم همیشه موفق و سربلند باشید 🌟

با آرزوی بهترین‌ها 💙`;
}

/* ===== IMAGE ===== */
function toBase64(file){
  return new Promise(res=>{
    let r=new FileReader();
    r.onload=()=>res(r.result);
    r.readAsDataURL(file);
  });
}

/* ===== SAVE ===== */
window.saveLetter = async function(){

  let id = Math.random().toString(36).substring(2,10);

  let file = document.getElementById("file").files[0];
  let img = file ? await toBase64(file) : "";

  let mode = document.getElementById("mode").value;

  let msgText = "";

  if(mode === "ai"){
    msgText = await generateAI(
      student.value,
      teacher.value,
      subject.value
    );
  } else {
    msgText = msg.value;
  }

  const data = {
    id,
    student: student.value,
    teacher: teacher.value,
    subject: subject.value,
    msg: msgText,
    img,
    music: musicUrl.value
  };

  const { error } = await supabase
    .from("letters")
    .insert([data]);

  if(error){
    alert("❌ خطا در ذخیره");
    console.log(error);
    return;
  }

  show(data,id);
};

/* ===== SHOW ===== */
function show(d,id){

  form.style.display="none";
  card.style.display="block";

  title.innerText="معلم گرامی " + d.teacher;
  text.innerText=d.msg;

  photo.src=d.img || "";
  music.src=d.music || "";

  let url = window.location.origin + window.location.pathname + "?id=" + id;

  link.innerHTML = `
    🔗 لینک نامه:
    <br><br>
    <button onclick="copy('${url}')">📋 کپی لینک</button>
    <button onclick="share('${url}')">📤 اشتراک</button>
  `;

  QRCode.toCanvas(document.createElement("canvas"), url, function (err, canvas) {
    document.getElementById("qr").innerHTML = "";
    document.getElementById("qr").appendChild(canvas);
  });
}

/* ===== COPY ===== */
window.copy = function(url){
  navigator.clipboard.writeText(url);
  alert("لینک کپی شد 📋");
};

/* ===== SHARE ===== */
window.share = function(url){
  if(navigator.share){
    navigator.share({ title:"Fancy Letter", url });
  }else{
    copy(url);
  }
};

/* ===== LOAD ===== */
window.onload = async function(){

  const id = new URLSearchParams(location.search).get("id");

  if(id){
    const { data } = await supabase
      .from("letters")
      .select("*")
      .eq("id", id)
      .single();

    if(data) show(data,id);
  }
};
</script>

</body>
</html>
