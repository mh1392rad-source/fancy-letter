<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letter Pro Offline</title>

<style>
body{
  margin:0;
  font-family:tahoma;
  background:linear-gradient(135deg,#7b2ff7,#f107a3,#00e5ff);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box{
  background:rgba(0,0,0,0.75);
  padding:20px;
  border-radius:25px;
  width:90%;
  max-width:420px;
  color:white;
  text-align:center;
}

input,textarea{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:20px;
  background:linear-gradient(45deg,#00ffcc,#00d4ff);
  font-weight:bold;
  cursor:pointer;
}

.card{
  display:none;
  background:white;
  width:90%;
  max-width:600px;
  padding:25px;
  border-radius:25px;
  text-align:center;
}

img{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid #ff4fa3;
}

h2{color:#d1007a;}
p{color:#333;line-height:2;}
</style>
</head>

<body>

<div class="box" id="form">
<h2>💌 ساخت نامه رایگان</h2>

<input id="student" placeholder="نام دانش‌آموز">
<input id="teacher" placeholder="نام معلم">
<textarea id="msg" placeholder="متن نامه"></textarea>

<input type="file" id="file" accept="image/*">

<button onclick="saveLetter()">ساخت نامه</button>
</div>

<div class="card" id="card">
<img id="photo">
<h2 id="title"></h2>
<p id="text"></p>
<p id="link"></p>
</div>

<script>
let currentID = null;

/* تبدیل عکس به Base64 */
function getBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = ()=>resolve(reader.result);
    reader.onerror = err=>reject(err);
  });
}

/* ساخت نامه */
async function saveLetter(){

  currentID = Math.random().toString(36).substring(2,10);

  let file = document.getElementById("file").files[0];
  let img = "";

  if(file){
    img = await getBase64(file);
  }

  let data = {
    student: student.value,
    teacher: teacher.value,
    msg: msg.value,
    img: img
  };

  localStorage.setItem("letter_"+currentID, JSON.stringify(data));

  showLetter(data, currentID);
}

/* نمایش نامه */
function showLetter(d,id){

  form.style.display="none";
  card.style.display="block";

  title.innerText="معلم گرامی " + d.teacher;

  text.innerHTML=d.msg.replace(/\n/g,"<br>");

  photo.src = d.img || "https://master-ai.ir/wp-content/uploads/2025/08/default-student.png";

  let link = window.location.href.split('?')[0] + "?id=" + id;

  linkBox.innerText="🔗 لینک نامه: " + link;
}

/* باز کردن از لینک */
window.onload = function(){

  let url = new URLSearchParams(window.location.search);
  let id = url.get("id");

  if(id){
    let data = localStorage.getItem("letter_"+id);
    if(data){
      showLetter(JSON.parse(data), id);
    }
  }
}
</script>

</body>
</html>
