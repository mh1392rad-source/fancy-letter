<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fancy Letter AI Pro</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:tahoma;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.container{
  width:95%;
  max-width:460px;
  animation:fade 0.8s ease-in;
}

@keyframes fade{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

.box,.card{
  background:rgba(0,0,0,0.8);
  color:white;
  padding:18px;
  border-radius:18px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

input,textarea,select,button{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  outline:none;
}

button{
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.03);
}

.card{
  display:none;
  background:white;
  color:black;
}

img{
  width:110px;
  height:110px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #0072ff;
}

#text{
  white-space:pre-wrap;
  line-height:2;
  margin-top:10px;
}

#status{
  font-size:13px;
  color:#00ffcc;
}

/* لینک کانال */
.channel{
  display:block;
  margin-top:15px;
  padding:10px;
  background:linear-gradient(45deg,#ffcc00,#ff9900);
  color:black;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<!-- FORM -->
<div class="box" id="form">
  <h2>💌 Fancy Letter AI Pro</h2>
  <div id="status"></div>

  <input id="student" placeholder="نام دانش‌آموز">
  <input id="teacher" placeholder="نام معلم">

  <textarea id="msg" placeholder="متن (اختیاری)"></textarea>

  <select id="mode">
    <option value="manual">دستی</option>
    <option value="ai">هوش مصنوعی</option>
  </select>

  <input type="file" id="file" accept="image/*">

  <input id="musicUrl" placeholder="لینک موسیقی (اختیاری)">

  <button onclick="createLetter()">🚀 ساخت نامه</button>
</div>

<!-- CARD -->
<div class="card" id="card">

  <img id="photo">
  <h2 id="title"></h2>
  <p id="text"></p>

  <audio id="music" controls loop></audio>

  <div id="qr"></div>

  <br>

  <button onclick="downloadLetter()">📥 دانلود</button>
  <button onclick="share()">🔗 اشتراک‌گذاری</button>
  <button onclick="location.reload()">🔄 جدید</button>

  <!-- 🔥 لینک کانال ایتا -->
  <a class="channel" href="https://eitaa.com/irandigital_python" target="_blank">
    📢 کانال ایتا ما
  </a>

</div>

</div>

<script>

const form = document.getElementById("form");
const card = document.getElementById("card");
const textEl = document.getElementById("text");
const titleEl = document.getElementById("title");
const photoEl = document.getElementById("photo");
const musicEl = document.getElementById("music");
const qr = document.getElementById("qr");
const statusBox = document.getElementById("status");

let saved = null;

function setStatus(t,c="#00ffcc"){statusBox.innerText=t;statusBox.style.color=c;}

function toBase64(file){
  return new Promise(r=>{
    const reader=new FileReader();
    reader.onload=()=>r(reader.result);
    reader.readAsDataURL(file);
  });
}

// 💌 AI TEXT
function generateAI(student, teacher){
  return `معلم عزیز ${teacher}

سال تحصیلی به سرعت گذشت و من از ته قلبم از زحمات شما بی‌نهایت سپاسگزارم.

هر لحظه‌ای که در کلاس شما بودم، برای من یک درس بزرگ و یک خاطره قشنگ بود.

شما نه تنها به من درس خواندن یاد دادید، بلکه به من یاد دادید چطور آدم بهتری باشم.

دلم برای کلاس‌های پرانرژی و مهربانی‌تان تنگ خواهد شد.

امیدوارم همیشه سلامت و شاد باشید و بدانید که من هیچ‌وقت زحمات شما را فراموش نمی‌کنم.

با احترام و عشق فراوان
${student}`;
}

async function createLetter(){
  try{
    setStatus("⏳ در حال ساخت...");

    const student=document.getElementById("student").value;
    const teacher=document.getElementById("teacher").value;
    let msg=document.getElementById("msg").value;
    const mode=document.getElementById("mode").value;
    const img=document.getElementById("file").files[0];
    const music=document.getElementById("musicUrl").value;

    const image = img ? await toBase64(img) : "";

    if(mode==="ai" || !msg){
      msg = generateAI(student, teacher);
    }

    saved = {student,teacher,msg,image,music};

    form.style.display="none";
    card.style.display="block";

    titleEl.innerText=teacher;
    textEl.innerText=msg;
    photoEl.src=image || "https://via.placeholder.com/120";
    musicEl.src=music || "";

    const link = URL.createObjectURL(new Blob([JSON.stringify(saved)], {type:"application/json"}));

    qr.innerHTML="";
    const canvas=document.createElement("canvas");
    QRCode.toCanvas(canvas,link);
    qr.appendChild(canvas);

    setStatus("✅ آماده شد");

  }catch(e){
    setStatus("❌ خطا","red");
    console.error(e);
  }
}

function downloadLetter(){
  const a=document.createElement("a");
  a.href="data:text/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(saved,null,2));
  a.download="letter.json";
  a.click();
}

function share(){
  navigator.clipboard.writeText(JSON.stringify(saved));
  alert("📋 کپی شد!");
}

</script>

</body>
</html>
