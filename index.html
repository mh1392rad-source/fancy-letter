<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fancy Letter NO LOGIN</title>

<style>
body{
  margin:0;
  font-family:tahoma;
  background:linear-gradient(135deg,#7b2ff7,#f107a3,#00e5ff);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box{
  background:rgba(0,0,0,0.75);
  padding:20px;
  border-radius:25px;
  width:90%;
  max-width:420px;
  color:white;
  text-align:center;
}

input,textarea{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  margin-top:6px;
  border:none;
  border-radius:20px;
  background:linear-gradient(45deg,#00ffcc,#00d4ff);
  font-weight:bold;
  cursor:pointer;
}

.card{
  display:none;
  background:white;
  width:90%;
  max-width:500px;
  padding:25px;
  border-radius:20px;
  text-align:center;
}

img{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #ff4fa3;
}

audio{
  width:100%;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- FORM -->
<div class="box" id="form">
<h2>💌 ساخت نامه</h2>

<input id="student" placeholder="نام دانش‌آموز">
<input id="teacher" placeholder="نام معلم">
<textarea id="msg" placeholder="متن نامه"></textarea>
<input type="file" id="file">
<input id="musicUrl" placeholder="لینک آهنگ (mp3)">

<button onclick="saveLetter()">ساخت نامه</button>
</div>

<!-- CARD -->
<div class="card" id="card">
<img id="photo">
<h2 id="title"></h2>
<p id="text"></p>

<audio id="music" controls loop></audio>

<p id="link"></p>
</div>

<script>
/* ===== IMAGE TO BASE64 ===== */
function toBase64(file){
  return new Promise(res=>{
    let r=new FileReader();
    r.onload=()=>res(r.result);
    r.readAsDataURL(file);
  });
}

/* ===== SAVE LETTER (LOCAL ONLY) ===== */
window.saveLetter = async function(){

  let id = Math.random().toString(36).substring(2,10);

  let file = document.getElementById("file").files[0];
  let img = file ? await toBase64(file) : "";

  let data = {
    id,
    student: student.value,
    teacher: teacher.value,
    msg: msg.value,
    img,
    music: musicUrl.value
  };

  // ذخیره در localStorage (بدون Supabase)
  localStorage.setItem("letter_" + id, JSON.stringify(data));

  show(data,id);
};

/* ===== SHOW LETTER ===== */
function show(d,id){

  form.style.display="none";
  card.style.display="block";

  title.innerText="معلم گرامی " + d.teacher;
  text.innerText=d.msg;

  photo.src=d.img || "";

  if(d.music){
    music.src = d.music;
  }

  let url = window.location.href.split('?')[0] + "?id=" + id;

  link.innerHTML = `
    🔗 لینک نامه:
    <br>
    <button onclick="copyLink('${url}')">📋 کپی لینک</button>
  `;
}

/* ===== COPY ===== */
function copyLink(url){
  navigator.clipboard.writeText(url);
  alert("لینک کپی شد 📋");
}

/* ===== LOAD LETTER ===== */
window.onload = function(){

  let id = new URLSearchParams(location.search).get("id");

  if(id){
    let data = localStorage.getItem("letter_" + id);

    if(data){
      show(JSON.parse(data), id);
    }
  }
};
</script>

</body>
</html>
