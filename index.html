<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fancy Letter GOD REAL 💎</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:tahoma;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box,.card{
  width:92%;
  max-width:520px;
  padding:20px;
  border-radius:18px;
  text-align:center;
  background:rgba(0,0,0,0.88);
  color:white;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

input,textarea,select,button{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  outline:none;
}

button{
  background:linear-gradient(45deg,#00d4ff,#00ffcc);
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.04);
}

.card{
  display:none;
  background:white;
  color:black;
  transform:translateY(30px) scale(0.95);
  opacity:0;
  transition:0.6s;
}

.card.show{
  transform:translateY(0) scale(1);
  opacity:1;
}

img{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
}
#text{
  white-space:pre-wrap;
  line-height:1.9;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="box" id="form">
<h2>💎 GOD REAL VERSION</h2>

<input id="student" placeholder="نام دانش‌آموز">
<input id="teacher" placeholder="نام معلم">
<input id="subject" placeholder="درس (اختیاری)">
<textarea id="msg" placeholder="متن (خالی = AI)"></textarea>

<button onclick="createLetter()">🚀 ساخت نامه</button>

<div id="status"></div>
</div>

<div class="card" id="card">
<img id="photo">
<h2 id="title"></h2>
<p id="text"></p>

<div id="qr"></div>

<button onclick="copyLink()">📋 کپی لینک</button>
<button onclick="downloadHTML()">⬇ دانلود HTML</button>
</div>

<script>

/* ================= SUPABASE ================= */
const SUPABASE_URL = "https://YOUR_PROJECT.supabase.co";
const SUPABASE_KEY = "YOUR_KEY";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ================= AI LETTER ================= */
function ai(student, teacher){
return `معلم عزیزم ${teacher}

سال تحصیلی به سرعت گذشت و من از ته قلبم از زحمات شما بی‌نهایت سپاسگزارم.

شما فقط درس ندادید، بلکه الهام زندگی بودید.

هر لحظه کلاس شما برای من یک خاطره است.

با احترام و عشق
${student}`;
}

/* ================= CREATE LETTER ================= */
window.createLetter = async function(){

  try{

    const student = document.getElementById("student").value;
    const teacher = document.getElementById("teacher").value;
    const subject = document.getElementById("subject").value;
    let msg = document.getElementById("msg").value;

    if(!msg){
      msg = ai(student, teacher);
    }

    const {data, error} = await client.from("letters").insert([{
      student,
      teacher,
      subject,
      msg
    }]).select();

    if(error){
      document.getElementById("status").innerText = "❌ " + error.message;
      return;
    }

    show(data[0]);

  }catch(e){
    document.getElementById("status").innerText = "❌ Network Error";
  }
};

/* ================= SHOW ================= */
function show(d){

  document.getElementById("form").style.display="none";
  const card=document.getElementById("card");
  card.style.display="block";

  setTimeout(()=>card.classList.add("show"),100);

  document.getElementById("title").innerText = d.teacher;
  document.getElementById("text").innerText = d.msg;

  window.link = location.origin + "?id=" + d.id;

  QRCode.toCanvas(document.createElement("canvas"), window.link, (e,c)=>{
    document.getElementById("qr").innerHTML="";
    document.getElementById("qr").appendChild(c);
  });
}

/* ================= COPY ================= */
function copyLink(){
  navigator.clipboard.writeText(window.link);
  alert("کپی شد");
}

/* ================= DOWNLOAD HTML ================= */
function downloadHTML(){

  const html = `
<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="font-family:tahoma;text-align:center">
<h2>${document.getElementById("title").innerText}</h2>
<pre>${document.getElementById("text").innerText}</pre>
</body>
</html>`;

  const blob = new Blob([html], {type:"text/html"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "letter.html";
  a.click();
}

/* ================= LOAD BY ID ================= */
const id = new URLSearchParams(location.search).get("id");

if(id){
  (async()=>{
    const {data} = await client.from("letters").select().eq("id",id).single();
    if(data) show(data);
  })();
}

</script>

</body>
</html>
