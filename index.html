<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Letter Pro</title>

<style>
body{
  margin:0;
  font-family:tahoma;
  background:radial-gradient(circle at top,#7b2ff7,#f107a3,#00e5ff);
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* فرم */
.box{
  background:rgba(0,0,0,0.75);
  padding:20px;
  border-radius:25px;
  width:90%;
  max-width:420px;
  color:white;
  box-shadow:0 0 30px rgba(0,255,255,0.3);
}

input,textarea{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:20px;
  background:linear-gradient(45deg,#00ffcc,#00d4ff);
  font-weight:bold;
  cursor:pointer;
}

/* پاکت واقعی‌تر */
.envelope{
  width:260px;
  height:170px;
  background:linear-gradient(135deg,#ff4fa3,#ff0077);
  border-radius:12px;
  position:relative;
  cursor:pointer;
  box-shadow:0 0 50px rgba(255,0,150,0.5);
  animation:float 2s infinite ease-in-out;
}

.envelope:before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  border-left:130px solid transparent;
  border-right:130px solid transparent;
  border-bottom:90px solid rgba(255,255,255,0.2);
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-12px);}
}

/* نامه */
.card{
  display:none;
  background:white;
  width:90%;
  max-width:600px;
  padding:30px;
  border-radius:25px;
  text-align:center;
  box-shadow:0 0 50px rgba(0,0,0,0.4);
  animation:open 0.8s ease;
}

@keyframes open{
  from{transform:scale(0.5);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

h2{color:#d1007a;}
p{color:#333;line-height:2;}

a{
  display:inline-block;
  margin-top:15px;
  padding:10px 20px;
  background:linear-gradient(45deg,#00d4ff,#00ff99);
  color:black;
  border-radius:20px;
  text-decoration:none;
  font-weight:bold;
}

/* قلب‌ها */
.heart{
  position:absolute;
  color:#ff4fa3;
  font-size:18px;
  animation:fall 3s linear infinite;
}

@keyframes fall{
  from{transform:translateY(0);opacity:1;}
  to{transform:translateY(-300px);opacity:0;}
}
</style>
</head>

<body>

<div class="box" id="form">
<h2>💌 Ultra Letter Pro</h2>

<input id="student" placeholder="نام دانش‌آموز">
<input id="teacher" placeholder="نام معلم">
<textarea id="msg" placeholder="متن نامه"></textarea>

<button onclick="start()">ساخت نامه</button>
</div>

<div id="env" style="display:none">
<div class="envelope" onclick="openLetter()"></div>
</div>

<div class="card" id="card">
<h2 id="title"></h2>
<p id="text"></p>

<a href="https://eitaa.com/irandigital_python" target="_blank">
📢 کانال ایران دیجیتال | Python
</a>
</div>

<audio id="sound">
<source src="https://assets.mixkit.co/sfx/preview/mixkit-paper-slide-1536.mp3" type="audio/mpeg">
</audio>

<script>
function start(){
  document.getElementById("form").style.display="none";
  document.getElementById("env").style.display="block";

  spawnHearts();
}

function openLetter(){
  document.getElementById("sound").play();

  document.getElementById("env").style.display="none";
  document.getElementById("card").style.display="block";

  document.getElementById("title").innerText =
  "معلم گرامی " + document.getElementById("teacher").value;

  document.getElementById("text").innerHTML =
  document.getElementById("msg").value.replace(/\n/g,"<br>");
}

/* قلب‌ها */
function spawnHearts(){
  for(let i=0;i<20;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤";
    h.style.left=Math.random()*100+"%";
    h.style.top=Math.random()*100+"%";
    h.style.animationDuration=(2+Math.random()*3)+"s";
    document.body.appendChild(h);
  }
}
</script>

</body>
</html>
