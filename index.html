<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fancy Letter Insta</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:tahoma;
  background:#0f0f0f;
  color:white;
}

/* TOP BAR */
.topbar{
  background:#111;
  padding:12px;
  text-align:center;
  font-weight:bold;
  font-size:18px;
  border-bottom:1px solid #222;
}

/* POST */
.post{
  background:#1a1a1a;
  margin:15px;
  border-radius:15px;
  padding:15px;
  box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.header{
  display:flex;
  align-items:center;
  gap:10px;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  background:linear-gradient(45deg,#ff4fa3,#00d4ff);
}

.name{
  font-weight:bold;
}

img{
  width:100%;
  border-radius:12px;
  margin-top:10px;
}

.actions{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

button{
  background:none;
  border:none;
  color:white;
  font-size:16px;
  cursor:pointer;
}

.like{
  color:#ff4fa3;
}

.comment-box{
  margin-top:10px;
}

input{
  width:100%;
  padding:8px;
  border-radius:10px;
  border:none;
}

.small{
  font-size:12px;
  color:#aaa;
  margin-top:5px;
}

#qr{
  margin-top:10px;
}
</style>
</head>

<body>

<div class="topbar">📱 Fancy Letter Instagram</div>

<!-- POST -->
<div class="post" id="post">

  <div class="header">
    <div class="avatar"></div>
    <div class="name" id="title">معلم گرامی</div>
  </div>

  <p id="text"></p>

  <img id="photo">

  <audio id="music" controls style="width:100%;margin-top:10px;"></audio>

  <div class="actions">
    <button class="like" onclick="like()">❤️ <span id="likes">0</span></button>
    <button onclick="share()">📤 Share</button>
    <button onclick="copy()">🔗 Link</button>
  </div>

  <div class="comment-box">
    <input id="comment" placeholder="نظر بنویس...">
  </div>

  <div id="qr"></div>

  <div class="small" id="link"></div>

</div>

<script>
let likeCount = 0;

/* ===== LOAD ===== */
window.onload = function(){

  let id = new URLSearchParams(location.search).get("id");

  let data = localStorage.getItem("letter_" + id);

  if(data){
    let d = JSON.parse(data);

    title.innerText = "📩 " + d.teacher;
    text.innerText = d.msg;
    photo.src = d.img || "";
    music.src = d.music || "";

    let url = window.location.href;

    link.innerText = url;

    QRCode.toCanvas(document.createElement("canvas"), url, function (err, canvas) {
      qr.appendChild(canvas);
    });
  }
};

/* ===== LIKE ===== */
function like(){
  likeCount++;
  document.getElementById("likes").innerText = likeCount;
}

/* ===== SHARE ===== */
function share(){
  navigator.share?.({ url: location.href }) || copy();
}

/* ===== COPY ===== */
function copy(){
  navigator.clipboard.writeText(location.href);
  alert("لینک کپی شد 📋");
}
</script>

</body>
</html>
