<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letter PRO MAX</title>

<style>
body{
  margin:0;
  font-family:tahoma;
  background:linear-gradient(135deg,#7b2ff7,#f107a3,#00e5ff);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box{
  background:rgba(0,0,0,0.75);
  padding:20px;
  border-radius:25px;
  width:90%;
  max-width:420px;
  color:white;
  text-align:center;
}

input,textarea{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:20px;
  background:linear-gradient(45deg,#00ffcc,#00d4ff);
  font-weight:bold;
  cursor:pointer;
}

.card{
  display:none;
  background:white;
  width:90%;
  max-width:600px;
  padding:25px;
  border-radius:25px;
  text-align:center;
}

img{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:10px;
  border:4px solid #ff4fa3;
}

h2{color:#d1007a;}
p{color:#333;line-height:2;}

a{
  display:inline-block;
  margin-top:10px;
  padding:10px 18px;
  background:linear-gradient(45deg,#00d4ff,#00ff99);
  color:black;
  border-radius:20px;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="box" id="form">
<h2>💌 Letter PRO MAX</h2>

<input id="student" placeholder="نام دانش‌آموز">
<input id="teacher" placeholder="نام معلم">

<input id="img" placeholder="لینک عکس (اختیاری)">

<textarea id="msg" placeholder="متن نامه"></textarea>

<button onclick="saveLetter()">ساخت نامه</button>
</div>

<div class="card" id="card">
<img id="photo">
<h2 id="title"></h2>
<p id="text"></p>

<div id="qr"></div>

<p id="link"></p>

<a href="https://eitaa.com/irandigital_python" target="_blank">
📢 کانال ایران دیجیتال | Python
</a>
</div>

<!-- QR Code -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBqyOm4xSfeUrThKDcA0mRM5OSZFOMyWcE",
  authDomain: "fancy-letter.firebaseapp.com",
  projectId: "fancy-letter",
  storageBucket: "fancy-letter.firebasestorage.app",
  messagingSenderId: "677609888778",
  appId: "1:677609888778:web:df826638952bd2c59593f3"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.saveLetter = function(){

  let id = Math.random().toString(36).substring(2,10);

  let data = {
    student: student.value,
    teacher: teacher.value,
    msg: msg.value,
    img: img.value
  };

  set(ref(db,"letters/"+id), data);

  showLetter(data, id);
};

function showLetter(d, id){

  form.style.display="none";
  card.style.display="block";

  title.innerText = "معلم گرامی " + d.teacher;
  text.innerHTML = d.msg.replace(/\n/g,"<br>");

  if(d.img){
    photo.src = d.img;
  } else {
    photo.src = "https://master-ai.ir/wp-content/uploads/2025/08/default-student.png";
  }

  let link = window.location.href.split('?')[0] + "?id=" + id;

  linkBox = document.getElementById("link");
  linkBox.innerText = "🔗 لینک نامه: " + link;

  new QRCode(document.getElementById("qr"), {
    text: link,
    width:120,
    height:120
  });
}

// خواندن از لینک
const url = new URLSearchParams(window.location.search);
const id = url.get("id");

if(id){
  get(child(ref(db),"letters/"+id)).then((snap)=>{
    if(snap.exists()){
      showLetter(snap.val(), id);
    }
  });
}
</script>

</body>
</html>
