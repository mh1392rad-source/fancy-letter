<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fancy Letter AI Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:tahoma;
  background:linear-gradient(135deg,#141e30,#243b55);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.box,.card{
  width:92%;
  max-width:450px;
  background:rgba(0,0,0,0.85);
  color:white;
  padding:20px;
  border-radius:20px;
  text-align:center;
}

input,textarea,select,button{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:none;
}

button{
  background:linear-gradient(45deg,#00d4ff,#00ffcc);
  font-weight:bold;
  cursor:pointer;
}

.card{
  display:none;
  background:white;
  color:black;
}

img{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
}

#text{
  white-space:pre-wrap;
  margin-top:10px;
  line-height:2;
}

#status{
  font-size:14px;
  color:#00ffcc;
}
</style>
</head>

<body>

<div class="box" id="form">
  <h2>💌 Fancy Letter AI Pro</h2>
  <div id="status"></div>

  <input id="student" placeholder="نام دانش‌آموز">
  <input id="teacher" placeholder="نام معلم">
  <input id="subject" placeholder="درس">

  <textarea id="msg" placeholder="متن (اختیاری)"></textarea>
  <select id="mode">
    <option value="manual">دستی</option>
    <option value="ai">هوش مصنوعی</option>
  </select>

  <input type="file" id="file" accept="image/*">

  <h3>🎵 موسیقی</h3>
  <select id="musicMode">
    <option value="url">لینک</option>
    <option value="upload">آپلود</option>
    <option value="smart">هوشمند</option>
  </select>

  <input id="musicUrl" placeholder="لینک آهنگ">
  <input type="file" id="musicFile" accept="audio/*" style="display:none">

  <button onclick="createLetter()">🚀 ساخت نامه</button>
</div>

<div class="card" id="card">
  <img id="photo">
  <h2 id="title"></h2>
  <p id="text"></p>

  <audio id="music" controls loop></audio>

  <div id="qr"></div>
  <br>
  <button onclick="copyLink()">📋 کپی لینک</button>
</div>

<script>

/* ================= DOM ================= */
const form = document.getElementById("form");
const card = document.getElementById("card");
const text = document.getElementById("text");
const title = document.getElementById("title");
const photo = document.getElementById("photo");
const music = document.getElementById("music");
const qr = document.getElementById("qr");
const statusBox = document.getElementById("status");

const musicMode = document.getElementById("musicMode");
const musicUrl = document.getElementById("musicUrl");
const musicFile = document.getElementById("musicFile");

musicMode.onchange = () => {
  musicUrl.style.display = "none";
  musicFile.style.display = "none";
  if (musicMode.value === "url") musicUrl.style.display = "block";
  if (musicMode.value === "upload") musicFile.style.display = "block";
};

/* ================= SUPABASE ================= */
const SUPABASE_URL = "https://YOUR_PROJECT.supabase.co"; // پروژه خودت
const SUPABASE_KEY = "sb_publishable_7aHzH58mQSbSKkdhu0emqQ_YaTegw3q"; // publishable key
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ================= HELPERS ================= */
function setStatus(t, c="#00ffcc"){ statusBox.innerText=t; statusBox.style.color=c; }
function toBase64(file){ return new Promise(res=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.readAsDataURL(file); }); }
function generateAI(student, teacher){ return `معلم عزیز ${teacher}\n\nسال تحصیلی با تلاش و یادگیری گذشت...\n\nبا احترام\n${student}`; }
function smartMusic(){ return "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"; }

/* ================= CREATE ================= */
async function createLetter(){
  try{
    setStatus("⏳ در حال ساخت...");

    const student = document.getElementById("student").value;
    const teacher = document.getElementById("teacher").value;
    let msg = document.getElementById("msg").value;
    const mode = document.getElementById("mode").value;
    const imgFile = document.getElementById("file").files[0];
    const image = imgFile ? await toBase64(imgFile) : "";

    if(!msg || mode==="ai") msg = generateAI(student, teacher);

    let musicValue="";
    if(musicMode.value==="url") musicValue=musicUrl.value;
    if(musicMode.value==="upload"){ const mf=musicFile.files[0]; musicValue=mf?await toBase64(mf):""; }
    if(musicMode.value==="smart") musicValue=smartMusic();

    const {data,error} = await supabaseClient
      .from("letters")
      .insert([{student,teacher,msg,image,music:musicValue}])
      .select();

    if(error){ setStatus("❌ خطا: "+error.message,"red"); return; }

    const id = data[0].id;
    const link = location.origin + "?id="+id;
    setStatus("✅ ساخته شد");
    show(data[0], link);

  }catch(e){ setStatus("❌ خطای ناشناخته","red"); console.error(e); }
}

/* ================= SHOW ================= */
function show(data,link){
  form.style.display="none"; card.style.display="block";
  title.innerText=data.teacher; text.innerText=data.msg;
  photo.src=data.image||"https://via.placeholder.com/120";
  music.src=data.music||"";
  window.generatedLink=link;
  qr.innerHTML="";
  const canvas=document.createElement("canvas");
  QRCode.toCanvas(canvas, link, err=>{if(!err) qr.appendChild(canvas);});
}

/* ================= COPY ================= */
function copyLink(){ navigator.clipboard.writeText(window.generatedLink); alert("لینک کپی شد!"); }

/* ================= LOAD ================= */
const params=new URLSearchParams(location.search);
const id=params.get("id");
if(id){ (async()=>{
  const {data,error}=await supabaseClient
    .from("letters").select().eq("id",id).single();
  if(error||!data){ setStatus("نامه پیدا نشد","red"); return; }
  show(data, location.href);
})(); }

</script>
</body>
</html>
