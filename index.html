<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fancy Letter AI Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
:root{
  --bg1:#141e30;
  --bg2:#243b55;
  --primary:#00d4ff;
  --accent:#ff4fa3;
}

body{
  margin:0;
  font-family:tahoma;
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.box,.card{
  width:92%;
  max-width:450px;
  background:rgba(0,0,0,0.85);
  color:white;
  padding:20px;
  border-radius:20px;
  text-align:center;
}

input,textarea,select,button{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:10px;
}

button{
  background:linear-gradient(45deg,var(--primary),#00ffcc);
  font-weight:bold;
  cursor:pointer;
}

.card{
  display:none;
  background:white;
  color:black;
}

img{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
}

#text{
  white-space:pre-wrap;
  line-height:2;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- FORM -->
<div class="box" id="form">
<h2>💌 Fancy Letter AI Pro</h2>

<input id="student" placeholder="نام دانش‌آموز">
<input id="teacher" placeholder="نام معلم">
<input id="subject" placeholder="درس">

<textarea id="msg" placeholder="متن دستی (اختیاری)"></textarea>

<select id="mode">
  <option value="manual">✍️ دستی</option>
  <option value="ai">🤖 هوش مصنوعی</option>
</select>

<input type="file" id="file" accept="image/*">

<h3>🎵 موسیقی</h3>
<select id="musicMode">
  <option value="url">لینک</option>
  <option value="upload">آپلود</option>
  <option value="smart">هوشمند</option>
</select>

<input id="musicUrl" placeholder="لینک آهنگ">
<input type="file" id="musicFile" accept="audio/*" style="display:none">

<button onclick="createLetter()">ساخت نامه 🚀</button>
</div>

<!-- CARD -->
<div class="card" id="card">
<img id="photo">
<h2 id="title"></h2>
<p id="text"></p>

<audio id="music" controls loop></audio>

<div id="qr"></div>

<a href="https://eitaa.com/irandigital_python" target="_blank">📢 کانال ایتا</a>

<br><br>
<button onclick="copyLink()">📋 کپی لینک</button>
</div>

<script>

/* ================= SUPABASE ================= */
const SUPABASE_URL = "https://YOUR_PROJECT.supabase.co";
const SUPABASE_KEY = "YOUR_ANON_KEY";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ================= UI MUSIC ================= */
const musicMode = document.getElementById("musicMode");
const musicUrl = document.getElementById("musicUrl");
const musicFile = document.getElementById("musicFile");

musicMode.onchange = ()=>{
  musicUrl.style.display="none";
  musicFile.style.display="none";

  if(musicMode.value==="url") musicUrl.style.display="block";
  if(musicMode.value==="upload") musicFile.style.display="block";
};

/* ================= BASE64 ================= */
function toBase64(file){
  return new Promise(r=>{
    const reader=new FileReader();
    reader.onload=()=>r(reader.result);
    reader.readAsDataURL(file);
  });
}

/* ================= AI TEXT ================= */
function generateAI(student,teacher){
return `معلم عزیزم ${teacher}

سال تحصیلی به سرعت گذشت و من از ته قلبم از زحمات شما بی‌نهایت سپاسگزارم.

شما به من فقط درس ندادید، بلکه انسان بودن یاد دادید.

با احترام فراوان

${student}`;
}

/* ================= TYPE ================= */
function type(el,text){
  el.innerText="";
  let i=0;
  let t=setInterval(()=>{
    el.innerText+=text[i];
    i++;
    if(i>=text.length) clearInterval(t);
  },20);
}

/* ================= SMART MUSIC ================= */
function smartMusic(){
  return "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3";
}

/* ================= CREATE ================= */
window.createLetter = async function(){

  const student = studentInput.value;
  const teacher = teacherInput.value;
  const subject = subjectInput.value;

  let msg = msgInput.value;
  const mode = modeSelect.value;

  const file = fileInput.files[0];
  const img = file ? await toBase64(file) : "";

  if(!msg || mode==="ai"){
    msg = generateAI(student,teacher);
  }

  let music = "";
  if(musicMode.value==="url") music = musicUrl.value;
  if(musicMode.value==="upload"){
    const mf = musicFile.files[0];
    if(mf) music = await toBase64(mf);
  }
  if(musicMode.value==="smart") music = smartMusic();

  const {data,error} = await supabase.from("letters").insert([{
    student,
    teacher,
    msg,
    image:img,
    music
  }]).select();

  if(error){
    alert(error.message);
    return;
  }

  const id = data[0].id;
  const link = location.origin + "?id=" + id;

  show(data[0], link);
};

/* ================= SHOW ================= */
function show(data,link){

  form.style.display="none";
  card.style.display="block";

  title.innerText = data.teacher;
  type(text,data.msg);

  photo.src = data.image;
  music.src = data.music;

  window.generatedLink = link;

  QRCode.toCanvas(document.createElement("canvas"),link,(e,c)=>{
    qr.innerHTML="";
    qr.appendChild(c);
  });
}

/* ================= COPY ================= */
function copyLink(){
  navigator.clipboard.writeText(window.generatedLink);
  alert("کپی شد");
}

/* ================= LOAD ================= */
const params = new URLSearchParams(location.search);
const id = params.get("id");

if(id){
  (async()=>{
    const {data} = await supabase.from("letters").select().eq("id",id).single();
    if(data){
      show(data,location.href);
    }
  })();
}

/* ================= FIX INPUTS ================= */
const studentInput = document.getElementById("student");
const teacherInput = document.getElementById("teacher");
const subjectInput = document.getElementById("subject");
const msgInput = document.getElementById("msg");
const modeSelect = document.getElementById("mode");
const fileInput = document.getElementById("file");

const form = document.getElementById("form");
const card = document.getElementById("card");
const text = document.getElementById("text");
const title = document.getElementById("title");
const photo = document.getElementById("photo");
const music = document.getElementById("music");
const qr = document.getElementById("qr");

</script>

</body>
</html>
