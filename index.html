
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fancy Letter AI ✨</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:tahoma;
  background:linear-gradient(135deg,#141e30,#243b55);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* BOX */
.box{
  background:rgba(0,0,0,0.85);
  padding:20px;
  border-radius:20px;
  width:92%;
  max-width:450px;
  color:white;
  text-align:center;
}

/* INPUT */
input,textarea,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:10px;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:6px;
  border:none;
  border-radius:15px;
  background:linear-gradient(45deg,#00d4ff,#00ffcc);
  font-weight:bold;
  cursor:pointer;
}
button:hover{transform:scale(1.05);}

/* CARD */
.card{
  display:none;
  background:white;
  width:92%;
  max-width:520px;
  padding:25px;
  border-radius:20px;
  text-align:center;
  transform:translateY(60px);
  opacity:0;
  transition:0.8s;
}
.card.show{
  transform:translateY(0);
  opacity:1;
}

img{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #ff4fa3;
}

#text{
  margin-top:15px;
  white-space:pre-wrap;
  line-height:1.8;
}

.eitaa{
  display:inline-block;
  margin-top:15px;
  background:#ff4fa3;
  padding:10px;
  border-radius:10px;
  color:white;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="box" id="form">

<h2>💌 Fancy Letter AI</h2>

<input id="student" placeholder="نام دانش‌آموز">
<input id="teacher" placeholder="نام معلم">
<input id="subject" placeholder="درس">

<select id="mode">
  <option value="manual">✍️ متن دستی</option>
  <option value="ai">🤖 متن با هوش مصنوعی</option>
</select>

<textarea id="msg" placeholder="متن دستی"></textarea>

<h3>🎵 موسیقی</h3>
<select id="musicMode">
  <option value="smart">🤖 هوشمند</option>
  <option value="url">🔗 لینک</option>
</select>

<input id="musicUrl" placeholder="لینک آهنگ">

<button onclick="create()">ساخت نامه 🚀</button>

</div>

<div class="card" id="card">
<img id="photo">
<h2 id="title"></h2>
<p id="text"></p>

<audio id="music" controls></audio>

<div id="qr"></div>

<a class="eitaa" href="https://eitaa.com/irandigital_python" target="_blank">
📢 کانال ایتا
</a>

<div id="actions"></div>
</div>

<script>

/* 🔗 سرور AI (باید خودت Deploy کنی) */
const API_URL = "https://YOUR-SERVER.com/generate";

/* 📸 image */
function toBase64(file){
  return new Promise(r=>{
    const f=new FileReader();
    f.onload=()=>r(f.result);
    f.readAsDataURL(file);
  });
}

/* 🎵 smart music */
function smartMusic(subject){
  subject=subject.toLowerCase();
  if(subject.includes("ریاضی"))
    return "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3";
  if(subject.includes("علوم"))
    return "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3";
  return "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3";
}

/* 🤖 AI request (SAFE) */
async function generateAI(student,teacher,subject){
  const res = await fetch(API_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({student,teacher,subject})
  });
  const data = await res.json();
  return data.text;
}

/* 🚀 CREATE */
async function create(){

  const student=document.getElementById("student").value;
  const teacher=document.getElementById("teacher").value;
  const subject=document.getElementById("subject").value;
  const mode=document.getElementById("mode").value;

  let text = "";

  if(mode==="ai"){
    text = await generateAI(student,teacher,subject);
  }else{
    text = document.getElementById("msg").value;
  }

  let musicMode=document.getElementById("musicMode").value;
  let music="";

  if(musicMode==="url"){
    music=document.getElementById("musicUrl").value;
  }else{
    music=smartMusic(subject);
  }

  show({student,teacher,text,music});
}

/* 🎨 SHOW CARD */
function show(d){

  document.getElementById("form").style.display="none";
  const card=document.getElementById("card");
  card.style.display="block";
  setTimeout(()=>card.classList.add("show"),100);

  document.getElementById("title").innerText="نامه از معلم " + d.teacher;
  document.getElementById("text").innerText=d.text;
  document.getElementById("music").src=d.music;

  const url=location.href.split("?")[0];

  document.getElementById("actions").innerHTML=`
    <button onclick="navigator.clipboard.writeText('${url}')">📋 کپی لینک</button>
    <button onclick="navigator.share ? navigator.share({url:'${url}'}) : alert('Share not supported')">📤 اشتراک</button>
  `;

  QRCode.toCanvas(document.createElement("canvas"),url,(e,c)=>{
    document.getElementById("qr").innerHTML="";
    document.getElementById("qr").appendChild(c);
  });
}

</script>

</body>
</html>
